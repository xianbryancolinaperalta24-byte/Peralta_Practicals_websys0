<!doctype html>
<html lang = "en">
<head> 
<meta charset = "utf-8">
<meta name="viewpoint" content="width=display-width initial-scales=1.0">
<title> Pizza by the slice </title>
<link rel="stylesheet" href="style.css">
</head>
	<body>
	<h1> pizza by the slice </h1>
	
	<form action ="#" method = "post"
	
	<h2> Personal Details </h2>
	<br>

	<label for ="name">Name:</label>
	<input type = "text" id="name" name="name" required minlenght ="5" maxlenght = "60"/>
	<br>

	<label for = "email">Email:</label>
	<input type = "email" id= "email" />
	<br>

	<label for = "phone">Phone:</label>
	<input type = "tel" id="phone" patterns="[0-9]" required minlenght="7" maxlenght="11"/>
	<br>
	
	<label for = "age">Age:</label>
	<input type = "num" id="age" min="13" max="99" required />
	<br>

	<label for = "address">Address:</label>
	<input type = "text" id="address"/>
	<br>

	<h2> Pizza Size </h2>
	
	<input type = "radio" name="pizza_size" id="small" required />
	<label for = "small">Small</label>
	<br>
	
	<input type = "radio" name="pizza_size" id="medium" required />
	<label for = "medium">Medium</label>
	<br>

	<input type = "radio" name="pizza_size" id="large" required />
	<label for = "large">Large</label>
	<br>

	<input type = "radio" name="pizza_size" id="Extra_large" required />
	<label for = "Extra_large">Extra Large</label>
	<br>

	<h2> Crust type </h2>
	<p> Choose a crust type: </p>
	


	<h2> Sauce </h2>


	
	<h2> Toppings </h2>
	<p> cheese is always included in any order. </p>
	
	<input type = "checkbox" name="toppings" id="cheese" />
	<label for = "cheese">Cheese</> <br>

	<input type = "checkbox" name="toppings" id="pepperoni" />
	<label for = "pepperoni">Pepperoni</> <br>

	<input type = "checkbox" name="toppings" id="mushrooms" />
	<label for = "mushrooms">Mushrooms</> <br>

	<input type = "checkbox" name="toppings" id="onions" />	
	<label for = "onions">Onions</> <br>

	<input type = "checkbox" name="toppings" id="bell_pepper" />
	<label for = "bell_pepper">Bell Pepper</> <br>

	<input type = "checkbox" name="toppings" id="olives" />
	<label for = "olives">Olives</> <br>

	<input type = "checkbox" name="toppings" id="bacon" />
	<label for = "bacon">Bacon</> <br>

	<input type = "checkbox" name="toppings" id="pineapple" />	
	<label for = "pineapple">Pineapple</> <br>

	<h2> Delivery Method </h2>
	
	<input type = "radio" name="Delivery_method" id="home" required />
	<label for = "home">Home Delivery </label> <br>
	
	<input type = "radio" name="Delivery_method" id="pickup" required />
	<label for = "pickup">Pickup </label> <br>
	
	<h4> Delivery address </h4>
	<p> Required for Home Delivery </p>
	
	<input type = "text" id="address" name="name"/> <br>


	
	



	</body>
